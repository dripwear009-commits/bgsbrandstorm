<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

  const scene = new THREE.Scene();
  // Set a fallback color so you don't get a black screen if the image fails
  scene.background = new THREE.Color(0x87CEEB); 

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(15, 8, 15);
  controls.enableDamping = true;

  // 1. LIGHTING
  const ambientLight = new THREE.AmbientLight(0xffffff, 2);
  scene.add(ambientLight);

  const sunLight = new THREE.DirectionalLight(0xffffff, 2);
  sunLight.position.set(10, 20, 10);
  scene.add(sunLight);

  // 2. THE ROAD (Using a built-in pattern so it doesn't fail to load)
  const planeGeo = new THREE.PlaneGeometry(200, 200);
  const planeMat = new THREE.MeshStandardMaterial({ 
    color: 0x222222,
    roughness: 0.9
  });
  const road = new THREE.Mesh(planeGeo, planeMat);
  road.rotation.x = -Math.PI / 2;
  road.position.y = 0; // Explicitly at zero
  scene.add(road);

  // 3. LOADERS
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck, interior;

  function setupModel(obj, isInterior = false) {
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    
    // Align bottom of model with Y=0 (the road)
    obj.position.x = -center.x;
    obj.position.y = (size.y / 2) - center.y;
    obj.position.z = -center.z;

    if (isInterior) {
      obj.scale.setScalar(10 / size.x);
      obj.rotation.y = 0; 
      obj.visible = false;
    } else {
      obj.scale.setScalar(15 / size.x);
      obj.traverse(child => {
        if (child.isMesh && child.material) {
          // Fix for the black overlay text
          child.material.transparent = false;
          child.material.alphaTest = 0.5; // Discards black/transparent pixels
          child.material.depthWrite = true;
          child.material.side = THREE.DoubleSide;
        }
      });
    }
  }

  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    setupModel(truck, false);
    scene.add(truck);
  }, undefined, (e) => console.error("Truck Load Error:", e));

  loader.load('./interior.glb', (gltf) => {
    interior = gltf.scene;
    setupModel(interior, true);
    scene.add(interior);
  }, undefined, (e) => console.error("Interior Load Error:", e));

  // 4. INTERACTION
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  window.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    if (truck && truck.visible) {
      const intersects = raycaster.intersectObject(truck, true);
      if (intersects.length > 0) {
        truck.visible = false;
        road.visible = false;
        scene.background = new THREE.Color(0x050505); 
        renderer.toneMappingExposure = 2.5; // Boost brightness inside

        if (interior) {
          interior.visible = true;
          camera.position.set(0, 0.05, 7.5); // Down and back as requested
          controls.target.set(0, 0.05, 0); 
          controls.enableZoom = false; 
          controls.enablePan = false;
          camera.updateProjectionMatrix();
        }
        controls.update();
      }
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
