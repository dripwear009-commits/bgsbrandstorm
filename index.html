<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

  const scene = new THREE.Scene();

  // 1. CAMERA & RENDERER (Far plane set to 10000 for infinite view)
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.shadowMap.enabled = true; // IMPORTANT FOR REALISM
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(20, 10, 20);
  controls.enableDamping = true;

  // 2. RESTORE CITY ENVIRONMENT (HDRI)
  new RGBELoader()
    .setPath('https://threejs.org/examples/textures/equirectangular/')
    .load('venice_sunset_1k.hdr', function (texture) {
      texture.mapping = THREE.EquirectangularReflectionMapping;
      scene.background = texture;
      scene.environment = texture;
    });

  // 3. ASPHALT ROAD (Infinite and Textured)
  const texLoader = new THREE.TextureLoader();
  // Using a detailed asphalt-like texture
  const roadBase = texLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg'); 
  roadBase.wrapS = roadBase.wrapT = THREE.RepeatWrapping;
  roadBase.repeat.set(200, 200); 
  roadBase.anisotropy = 16;

  const roadGeo = new THREE.PlaneGeometry(5000, 5000); 
  const roadMat = new THREE.MeshStandardMaterial({ 
    map: roadBase, 
    color: 0x151515, // Darken the texture to look like asphalt
    roughness: 0.8
  });
  
  const road = new THREE.Mesh(roadGeo, roadMat);
  road.rotation.x = -Math.PI / 2;
  
  // ADJUST FLOOR LEVEL MANUALLY HERE
  road.position.y = -3; 
  
  road.receiveShadow = true; // Allow truck to cast shadow on road
  scene.add(road);

  // 4. LIGHTING
  const ambient = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambient);

  const sun = new THREE.DirectionalLight(0xffffff, 1.5);
  sun.position.set(20, 50, 20);
  sun.castShadow = true;
  // Shadow camera setup for large areas
  sun.shadow.camera.left = -50;
  sun.shadow.camera.right = 50;
  sun.shadow.camera.top = 50;
  sun.shadow.camera.bottom = -50;
  scene.add(sun);

  // 5. LOADERS
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck;
  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    
    // Position Truck
    const box = new THREE.Box3().setFromObject(truck);
    const center = box.getCenter(new THREE.Vector3());
    truck.position.x = -center.x;
    truck.position.z = -center.z;
    truck.position.y = 0; 

    truck.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true; 
        child.receiveShadow = true;
      }
    });
    
    scene.add(truck);
  });

  // ANIMATION
  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
