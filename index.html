<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xeeeeee);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.5; 
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(8, 5, 10);
  controls.enableDamping = true;
  controls.update();

  // BRIGHTER LIGHTING
  scene.add(new THREE.AmbientLight(0xffffff, 2)); 
  const sun = new THREE.DirectionalLight(0xffffff, 2);
  sun.position.set(5, 10, 5);
  scene.add(sun);

  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');

  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck, interior;

  // Function to center a model if it's "floating" far from 0,0,0
  function centerModel(obj) {
    const box = new THREE.Box3().setFromObject(obj);
    const center = box.getCenter(new THREE.Vector3());
    obj.position.sub(center); 
  }

  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    centerModel(truck);
    scene.add(truck);
  });

  loader.load('./interior.glb', (gltf) => {
    interior = gltf.scene;
    centerModel(interior);
    interior.visible = false;
    scene.add(interior);
  }, undefined, (e) => console.error("Interior error:", e));

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  window.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    if (truck && truck.visible) {
      const intersects = raycaster.intersectObject(truck, true);
      if (intersects.length > 0) {
        // 1. Hide truck, show interior
        truck.visible = false;
        if (interior) {
          interior.visible = true;
          
          // 2. ZOOM IN: Move camera very close to the center
          // Adjust these numbers if you are still "too far"
          camera.position.set(0, 0.5, 1); 
          controls.target.set(0, 0, 0); 
          
          // 3. Prevent camera from clipping through small models
          camera.near = 0.01;
          camera.updateProjectionMatrix();
        }
        controls.update();
      }
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
