<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0; 
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(15, 8, 15);
  controls.enableDamping = true;

  // 1. NATURAL BACKGROUND (HDRI)
  let skyTexture;
  new RGBELoader()
    .setPath('https://threejs.org/examples/textures/equirectangular/')
    .load('venice_sunset_1k.hdr', function (texture) {
      texture.mapping = THREE.EquirectangularReflectionMapping;
      skyTexture = texture;
      scene.background = skyTexture;
      scene.environment = skyTexture;
    });

  // 2. CONCRETE ROAD
  const planeSize = 100;
  const loader_tex = new THREE.TextureLoader();
  const concreteTex = loader_tex.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg'); 
  concreteTex.wrapS = THREE.RepeatWrapping;
  concreteTex.wrapT = THREE.RepeatWrapping;
  concreteTex.repeat.set(10, 10);

  const planeGeo = new THREE.PlaneGeometry(planeSize, planeSize);
  const planeMat = new THREE.MeshStandardMaterial({ color: 0x333333 }); // Dark concrete
  const road = new THREE.Mesh(planeGeo, planeMat);
  road.rotation.x = Math.PI * -0.5;
  scene.add(road);

  scene.add(new THREE.AmbientLight(0xffffff, 0.5)); 

  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck, interior;

  function setupModel(obj, isInterior = false) {
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    
    obj.position.x = -center.x;
    obj.position.y = (size.y / 2) - center.y; 
    obj.position.z = -center.z;

    if (isInterior) {
      obj.scale.setScalar(10 / size.x);
      obj.rotation.y = 0; 
      obj.visible = false;
    } else {
      obj.scale.setScalar(15 / size.x);
      obj.traverse(child => {
        if (child.isMesh && child.material) {
          child.material.transparent = false;
          child.material.alphaTest = 0.5;
          child.material.depthWrite = true;
        }
      });
    }
  }

  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    setupModel(truck, false);
    scene.add(truck);
  });

  loader.load('./interior.glb', (gltf) => {
    interior = gltf.scene;
    setupModel(interior, true);
    scene.add(interior);
  });

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  window.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    if (truck && truck.visible) {
      const intersects = raycaster.intersectObject(truck, true);
      if (intersects.length > 0) {
        // --- TRANSITION TO INTERIOR ---
        truck.visible = false;
        road.visible = false;
        
        // Switch to a clean, dark "Studio" background
        scene.background = new THREE.Color(0x050505); 
        renderer.toneMappingExposure = 2.0; // Boost light inside

        if (interior) {
          interior.visible = true;
          // POSITION: Lower (Y=0.1) and Further Back (Z=7.0)
          camera.position.set(0, 0.1, 7.0); 
          controls.target.set(0, 0.1, 0); 
          controls.enableZoom = false; 
          controls.enablePan = false;
          camera.updateProjectionMatrix();
        }
        controls.update();
      }
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
