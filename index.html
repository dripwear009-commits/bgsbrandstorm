<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.0; 
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(15, 8, 15);
  controls.enableDamping = true;

  // 1. HDRI BACKGROUND
  let skyTexture;
  new RGBELoader()
    .setPath('https://threejs.org/examples/textures/equirectangular/')
    .load('venice_sunset_1k.hdr', function (texture) {
      texture.mapping = THREE.EquirectangularReflectionMapping;
      skyTexture = texture;
      scene.background = skyTexture;
      scene.environment = skyTexture;
    });

  // 2. REALISTIC ROAD
  const textureLoader = new THREE.TextureLoader();
  // Using a realistic asphalt texture
  const roadBase = textureLoader.load('https://threejs.org/examples/textures/floors/FloorsCheckerboard_S_Diffuse.jpg'); // Placeholder for structure
  const roadTexture = textureLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg'); 
  
  // Customizing the texture to look like dark asphalt
  roadTexture.wrapS = roadTexture.wrapT = THREE.RepeatWrapping;
  roadTexture.repeat.set(20, 20);
  roadTexture.colorSpace = THREE.SRGBColorSpace;

  const planeGeo = new THREE.PlaneGeometry(200, 200);
  const planeMat = new THREE.MeshStandardMaterial({ 
    map: roadTexture,
    color: 0x222222, // Darken the texture significantly to look like asphalt
    roughness: 0.8,
    metalness: 0.1
  });
  
  const road = new THREE.Mesh(planeGeo, planeMat);
  road.rotation.x = Math.PI * -0.5;
  scene.add(road);

  // LIGHTING
  scene.add(new THREE.AmbientLight(0xffffff, 0.8)); 

  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck, interior;

  function setupModel(obj, isInterior = false) {
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    
    // FIXING THE GROUNDING (Ensures truck sits ON the road)
    obj.position.x = -center.x;
    obj.position.y = (size.y / 2) - center.y; 
    obj.position.z = -center.z;

    if (isInterior) {
      obj.scale.setScalar(10 / size.x);
      obj.rotation.y = 0; 
      obj.visible = false;
    } else {
      obj.scale.setScalar(15 / size.x);
      obj.traverse(child => {
        if (child.isMesh && child.material) {
          // Final fix for text overlays
          child.material.transparent = false;
          child.material.depthWrite = true;
          child.material.alphaTest = 0.5;
        }
      });
    }
  }

  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    setupModel(truck, false);
    scene.add(truck);
  }, undefined, (e) => console.error(e));

  loader.load('./interior.glb', (gltf) => {
    interior = gltf.scene;
    setupModel(interior, true);
    scene.add(interior);
  });

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  window.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    if (truck && truck.visible) {
      const intersects = raycaster.intersectObject(truck, true);
      if (intersects.length > 0) {
        truck.visible = false;
        road.visible = false;
        scene.background = new THREE.Color(0x020202); // Pure focus black
        renderer.toneMappingExposure = 2.2; 

        if (interior) {
          interior.visible = true;
          camera.position.set(0,
