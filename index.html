<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(30, 15, 50); // Set camera further back for the larger truck
  controls.enableDamping = true;

  // 1. HDRI BACKGROUND
  new RGBELoader()
    .setPath('https://threejs.org/examples/textures/equirectangular/')
    .load('venice_sunset_1k.hdr', function (texture) {
      texture.mapping = THREE.EquirectangularReflectionMapping;
      scene.background = texture;
      scene.environment = texture;
    });

  // 2. LIGHTING
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 1.2);
  sun.position.set(10, 50, 10);
  scene.add(sun);

  // 3. MASSIVE ASPHALT ROAD
  const texLoader = new THREE.TextureLoader();
  const asphaltTex = texLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
  asphaltTex.wrapS = asphaltTex.wrapT = THREE.RepeatWrapping;
  asphaltTex.repeat.set(800, 800); 

  const roadGeo = new THREE.PlaneGeometry(5000, 5000);
  const roadMat = new THREE.MeshStandardMaterial({ 
    map: asphaltTex, 
    color: 0x111111,
    roughness: 0.9
  });
  const road = new THREE.Mesh(roadGeo, roadMat);
  road.rotation.x = -Math.PI / 2;
  
  // FIXED HEIGHT: Lowered to ground level so it doesn't float in the sky
  road.position.y = -5.0; 
  scene.add(road);

  // 4. LOADERS
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck, interior;

  // TRUCK LOAD
  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    const box = new THREE.Box3().setFromObject(truck);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());

    // Scale Up: Changed from 15 to 40
    truck.scale.setScalar(40 / size.x);
    
    // Position truck so tires touch the road at Y = -5.0
    truck.position.x = -center.x;
    truck.position.z = -center.z;
    truck.position.y = -5.0; 

    scene.add(truck);
  });

  // INTERIOR LOAD
  loader.load('./interior.glb', (gltf) => {
    interior = gltf.scene;
    interior.visible = false;
    scene.add(interior);
  });

  // 5. CLICK INTERACTION
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  window.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    if (truck && truck.visible) {
      const intersects = raycaster.intersectObjects(truck.children, true);
      if (intersects.length > 0) {
        // Transition
        truck.visible = false;
        road.visible = false;
        scene.background = new THREE.Color(0x050505);
        
        if (interior) {
          interior.visible = true;
          camera.position.set(0, 0, 5);
          controls.target.set(0, 0, 0);
        }
      }
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
