<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #333; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB); // Sky Blue

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(15, 8, 15);

  // LIGHTING - This light stays with the camera so you can always see
  const camLight = new THREE.PointLight(0xffffff, 100);
  camera.add(camLight);
  scene.add(camera);

  const ambient = new THREE.AmbientLight(0xffffff, 1);
  scene.add(ambient);

  // ROAD
  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(200, 200),
    new THREE.MeshStandardMaterial({ color: 0x222222 })
  );
  road.rotation.x = -Math.PI / 2;
  scene.add(road);

  // TEST BOX (If you see this but no truck, your file paths are wrong)
  const testBox = new THREE.Mesh(new THREE.BoxGeometry(1,1,1), new THREE.MeshStandardMaterial({color: 0x00ff00}));
  testBox.position.y = 5;
  scene.add(testBox);

  // LOADERS
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck, interior;

  function setupModel(obj, isInterior = false) {
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    
    obj.position.x = -center.x;
    obj.position.y = (size.y / 2) - center.y;
    obj.position.z = -center.z;

    if (isInterior) {
      obj.scale.setScalar(10 / size.x);
      obj.visible = false;
    } else {
      obj.scale.setScalar(15 / size.x);
      obj.traverse(child => {
        if (child.isMesh) {
          // Fix black overlay
          child.material.transparent = false;
          child.material.alphaTest = 0.5;
          child.material.depthWrite = true;
        }
      });
    }
    scene.add(obj);
    testBox.visible = false; // Hide test box once something loads
  }

  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    setupModel(truck, false);
  }, undefined, (e) => console.error("Truck Error:", e));

  loader.load('./interior.glb', (gltf) => {
    interior = gltf.scene;
    setupModel(interior, true);
  }, undefined, (e) => console.error("Interior Error:", e));

  window.addEventListener('click', (event) => {
    const mouse = new THREE.Vector2(
      (event.clientX / window.innerWidth) * 2 - 1,
      -(event.clientY / window.innerHeight) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);

    if (truck && truck.visible) {
      const intersects = raycaster.intersectObject(truck, true);
      if (intersects.length > 0) {
        truck.visible = false;
        road.visible = false;
        scene.background = new THREE.Color(0x000000);
        if (interior) {
          interior.visible = true;
          // Downwards and Backwards as requested
          camera.position.set(0, 0.01, 8.5); 
          controls.target.set(0, 0, 0);
          controls.enableZoom = false;
        }
      }
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>
</body>
</html>
