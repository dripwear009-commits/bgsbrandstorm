<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #eeeeee; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xcccccc);

  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.01, 1000);
  
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ReinhardToneMapping; 
  renderer.toneMappingExposure = 2.2; 
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(12, 6, 12);
  controls.enableDamping = true;

  // REVERTED LIGHTING: High intensity ambient to lift interior shadows
  scene.add(new THREE.AmbientLight(0xffffff, 3.5)); 
  const topLight = new THREE.DirectionalLight(0xffffff, 2);
  topLight.position.set(5, 20, 5);
  scene.add(topLight);

  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');

  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck, interior;

  function setupModel(obj, isInterior = false) {
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    obj.position.sub(center); 

    if (isInterior) {
      const scaleFactor = 10 / size.x; 
      obj.scale.setScalar(scaleFactor);
      obj.rotation.y = Math.PI; 
      // DoubleSide removed to fix text overlay/black artifacts
    } else {
      const scaleFactor = 15 / size.x;
      obj.scale.setScalar(scaleFactor);
    }
  }

  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    setupModel(truck, false);
    scene.add(truck);
  });

  loader.load('./interior.glb', (gltf) => {
    interior = gltf.scene;
    setupModel(interior, true);
    interior.visible = false;
    scene.add(interior);
  });

  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  window.addEventListener('click', (event) => {
    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    if (truck && truck.visible) {
      const intersects = raycaster.intersectObject(truck, true);
      if (intersects.length > 0) {
        truck.visible = false;
        if (interior) {
          interior.visible = true;

          // CAMERA ADJUSTMENT:
          // Y = 0.8 (Lower/Downwards)
          // Z = 4.5 (Further Backwards)
          camera.position.set(0, 0.8, 4.5); 
          controls.target.set(0, 0.8, 0); 
          
          controls.enableZoom = false; 
          controls.enablePan = false;
          
          camera.updateProjectionMatrix();
        }
        controls.update();
      }
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
