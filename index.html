<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

  const scene = new THREE.Scene();
  
  // FOG: This is the secret to an infinite floor. It fades the floor into the sky.
  scene.fog = new THREE.FogExp2(0x87ceeb, 0.005); 
  scene.background = new THREE.Color(0x87ceeb); 

  // Camera Far increased to 5000 so the floor doesn't cut off
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(20, 12, 25);
  controls.enableDamping = true;
  controls.maxDistance = 100; // Prevents user from zooming out too far and seeing the edge

  // LIGHTING
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 1.5);
  sun.position.set(50, 100, 50);
  scene.add(sun);

  // 1. INFINITE ASPHALT FLOOR WITH TEXTURE
  const texLoader = new THREE.TextureLoader();
  // Using a realistic asphalt texture
  const asphaltTexture = texLoader.load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/terrain/grasslight-big.jpg'); 

  
  asphaltTexture.wrapS = THREE.RepeatWrapping;
  asphaltTexture.wrapT = THREE.RepeatWrapping;
  asphaltTexture.repeat.set(200, 200); // High repeat for realistic scale
  asphaltTexture.anisotropy = renderer.capabilities.getMaxAnisotropy(); // Keeps texture sharp at a distance

  const roadGeo = new THREE.PlaneGeometry(2000, 2000); // Massive plane
  const roadMat = new THREE.MeshStandardMaterial({ 
    map: asphaltTexture, 
    color: 0x111111, // Tints the texture to a dark asphalt charcoal
    roughness: 0.9,
    metalness: 0.1
  });
  
  const road = new THREE.Mesh(roadGeo, roadMat);
  road.rotation.x = -Math.PI / 2;
  road.position.y = -5; // Manually lowered to match tires
  scene.add(road);

  // HDRI
  new RGBELoader()
    .setPath('https://threejs.org/examples/textures/equirectangular/')
    .load('venice_sunset_1k.hdr', function (texture) {
      texture.mapping = THREE.EquirectangularReflectionMapping;
      scene.environment = texture;
      // We keep the solid sky color for the fog to blend correctly
    });

  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck, interior;

  function setupModel(obj, isInterior = false) {
    const box = new THREE.Box3().setFromObject(obj);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());
    
    obj.position.x = -center.x;
    obj.position.z = -center.z;

    if (isInterior) {
      obj.position.y = (size.y / 2) - center.y; 
      obj.scale.setScalar(10 / size.x);
      obj.visible = false;
    } else {
      obj.position.y = 0; 
      obj.scale.setScalar(15 / size.x);
    }
  }

  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    setupModel(truck, false);
    scene.add(truck);
  });

  loader.load('./interior.glb', (gltf) => {
    interior = gltf.scene;
    setupModel(interior, true);
    scene.add(interior);
  });

  window.addEventListener('click', (event) => {
    const mouse = new THREE.Vector2(
      (event.clientX / window.innerWidth) * 2 - 1,
      -(event.clientY / window.innerHeight) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);

    if (truck && truck.visible) {
      const intersects = raycaster.intersectObject(truck, true);
      if (intersects.length > 0) {
        truck.visible = false;
        road.visible = false;
        scene.fog = null; // Remove fog for interior view
        scene.background = new THREE.Color(0x050505); 
        if (interior) {
          interior.visible = true;
          camera.position.set(0, 0.5, 5); 
          controls.target.set(0, 0.5, 0); 
          controls.update();
        }
      }
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
