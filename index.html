<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Truck Exam Center</title>
  <style>
    body { margin: 0; overflow: hidden; background-color: #000; }
  </style>
</head>
<body>

<script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
  import { RGBELoader } from 'three/addons/loaders/RGBELoader.js';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  camera.position.set(0, 10, 80); 
  controls.enableDamping = true;

  // 1. HDRI BACKGROUND
  // 1. UPDATED HDRI BACKGROUND (City Plaza, no water)
new RGBELoader()
  .setPath('https://threejs.org/examples/textures/equirectangular/')
  .load('royal_esplanade_1k.hdr', function (texture) {
    texture.mapping = THREE.EquirectangularReflectionMapping;
    scene.background = texture;
    scene.environment = texture;
  });

  // 2. THE ROAD (Using asphalt.jpg)
  const texLoader = new THREE.TextureLoader();
  const roadTex = texLoader.load('asphalt.jpg', (txt) => {
      txt.wrapS = txt.wrapT = THREE.RepeatWrapping;
      txt.repeat.set(200, 200); 
  });

  const roadGeo = new THREE.PlaneGeometry(5000, 5000);
  const roadMat = new THREE.MeshStandardMaterial({ 
    map: roadTex, 
    color: 0x444444 
  });
  const road = new THREE.Mesh(roadGeo, roadMat);
  road.rotation.x = -Math.PI / 2;
  
  // MASTER HEIGHT CONTROL - Lowered further to match background horizon
  const GROUND_Y = -10.0; 
  road.position.y = GROUND_Y;
  scene.add(road);

  // 3. LOADERS
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.7/');
  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);

  let truck, interior;

  loader.load('./truck.glb', (gltf) => {
    truck = gltf.scene;
    const box = new THREE.Box3().setFromObject(truck);
    const size = box.getSize(new THREE.Vector3());
    const center = box.getCenter(new THREE.Vector3());

    const scaleFactor = 75 / size.x;
    truck.scale.setScalar(scaleFactor); 
    
    // Position truck relative to GROUND_Y
    const scaledHeight = size.y * scaleFactor;
    truck.position.set(-center.x, GROUND_Y + (scaledHeight / 2), -center.z); 
    
    scene.add(truck);
  });

  loader.load('./interior.glb', (gltf) => {
    interior = gltf.scene;
    const box = new THREE.Box3().setFromObject(interior);
    const size = box.getSize(new THREE.Vector3());
    interior.scale.setScalar(12 / size.x);
    interior.visible = false;
    scene.add(interior);
  });

  // 4. INTERACTION
  window.addEventListener('mousedown', (event) => {
    const mouse = new THREE.Vector2(
      (event.clientX / window.innerWidth) * 2 - 1,
      -(event.clientY / window.innerHeight) * 2 + 1
    );
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);

    if (truck && truck.visible) {
      const intersects = raycaster.intersectObject(truck, true);
      if (intersects.length > 0) {
        truck.visible = false;
        road.visible = false;
        scene.background = new THREE.Color(0x050505);

        if (interior) {
          interior.visible = true;
          // POSITION: Set Z to 6.0 for a more zoomed-out view of the interior
          camera.position.set(0, 0.5, 6.5); 
          controls.target.set(0, 0.5, 0);
          controls.enableZoom = false; 
          controls.update();
        }
      }
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
</script>

</body>
</html>
